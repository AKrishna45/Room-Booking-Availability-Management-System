<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Register | Luxury Homes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="auth-container">
    <div class="form-box">
        <h2>Register</h2>

        <p th:if="${error}" style="color:#ef4444;" th:text="${error}"></p>
        <div th:if="${#fields.hasErrors('*')}" style="color:#ef4444;">
            <p th:each="err : ${#fields.errors('*')}" th:text="${err}"></p>
        </div>

        <form method="POST" th:action="@{/register}" th:object="${registerDto}">
            <input type="text" th:field="*{fullname}" placeholder="Full Name" required/>
            <input type="email" th:field="*{email}" placeholder="Email" required/>
            <input type="password" th:field="*{password}" placeholder="Strong Password"
                   pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&amp;*(),.?&quot;:{}|&lt;&gt;]).{8,}"
                   title="Must be 8+ chars with uppercase, lowercase, number, and special character." required/>
            <p style="font-size:11px;color:#94a3b8;margin:-5px 0 10px;text-align:left;">
                * Min 8 chars, 1 uppercase, 1 number, 1 special char
            </p>
            <button type="submit">Register</button>
            <p>Already have an account? <a th:href="@{/login}">Login</a></p>
        </form>
    </div>
</div>
</body>
</html>
