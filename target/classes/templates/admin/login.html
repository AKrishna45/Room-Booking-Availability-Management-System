<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Login | Luxury Homes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
</head>
<body class="auth-container">
<div class="form-box" style="width:400px;">
    <div class="admin-header">
        <h2 style="margin-bottom:5px;font-weight:800;">Admin Portal</h2>
        <p style="color:var(--text-muted);font-size:14px;margin-bottom:30px;">Luxury Homes Management</p>
    </div>

    <p th:if="${error}" style="color:#ef4444;font-size:14px;margin-bottom:20px;font-weight:600;"
       th:text="${error}"></p>

    <form method="POST" th:action="@{/admin/login}">
        <input type="email" name="email" placeholder="Admin Email" required/>
        <input type="password" name="password" placeholder="Password" required/>
        <button type="submit">Secure Login</button>
    </form>
    <p style="margin-top:30px;font-size:13px;">
        <a th:href="@{/}" style="color:var(--primary-light);text-decoration:none;font-weight:600;">&larr; Return to main site</a>
    </p>
</div>
</body>
</html>
