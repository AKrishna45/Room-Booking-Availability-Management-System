<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login | Luxury Homes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="auth-container">
    <div class="form-box">
        <h2>Login</h2>

        <p th:if="${error}" style="color:#ef4444;" th:text="${error}"></p>
        <p th:if="${param.registered}" style="color:#10b981;">Registration successful! Please login.</p>

        <form method="POST" th:action="@{/login}">
            <input type="email" name="email" placeholder="Email" required/>
            <input type="password" name="password" placeholder="Password" required/>
            <button type="submit">Login</button>
            <p>Don't have an account? <a th:href="@{/register}">Register</a></p>
        </form>
    </div>
</div>
</body>
</html>
